<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS.LAUNCH — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #E02020;
    --red-dark: #A50E0E;
    --blue: #1444F5;
    --blue-dark: #0B2DB5;
    --white: #F7F7F8;
    --muted: rgba(247,247,248,0.45);
    --dark: #080810;
    --card: rgba(14,14,24,0.85);
    --border: rgba(247,247,248,0.08);
    --border-hover: rgba(247,247,248,0.18);
    --input-bg: rgba(247,247,248,0.04);
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--white);
    overflow: hidden;
  }

  .scene {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 56px 56px;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(90px);
    animation: drift 10s ease-in-out infinite alternate;
  }

  .orb-red {
    width: 520px; height: 520px;
    background: radial-gradient(circle, rgba(224,32,32,0.28) 0%, transparent 70%);
    top: -120px; left: -80px;
    animation-delay: 0s;
  }

  .orb-blue {
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(20,68,245,0.24) 0%, transparent 70%);
    bottom: -150px; right: -100px;
    animation-delay: -4s;
  }

  .orb-red2 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(224,32,32,0.14) 0%, transparent 70%);
    bottom: 10%; left: 30%;
    animation-delay: -7s;
  }

  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(40px, 30px) scale(1.08); }
  }

  .accent-lines {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .accent-lines::before {
    content: '';
    position: absolute;
    top: -10%; left: 50%;
    width: 1px; height: 140%;
    background: linear-gradient(to bottom, transparent, rgba(224,32,32,0.15), rgba(20,68,245,0.15), transparent);
    transform: rotate(-20deg);
  }

  .accent-lines::after {
    content: '';
    position: absolute;
    top: -10%; left: 55%;
    width: 1px; height: 140%;
    background: linear-gradient(to bottom, transparent, rgba(20,68,245,0.08), transparent);
    transform: rotate(-20deg);
  }

  /* ── Card ── */
  .card {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 460px;
    padding: 48px 44px 40px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    animation: cardIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 20%; right: 20%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--red), var(--blue), transparent);
    border-radius: 0 0 4px 4px;
  }

  .corner {
    position: absolute;
    width: 16px; height: 16px;
    pointer-events: none;
  }
  .corner-tl { top: -1px; left: -1px; border-top: 2px solid var(--red); border-left: 2px solid var(--red); border-radius: 16px 0 0 0; }
  .corner-tr { top: -1px; right: -1px; border-top: 2px solid var(--blue); border-right: 2px solid var(--blue); border-radius: 0 16px 0 0; }
  .corner-bl { bottom: -1px; left: -1px; border-bottom: 2px solid var(--blue); border-left: 2px solid var(--blue); border-radius: 0 0 0 16px; }
  .corner-br { bottom: -1px; right: -1px; border-bottom: 2px solid var(--red); border-right: 2px solid var(--red); border-radius: 0 0 16px 0; }

  /* ── Brand ── */
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 36px;
    animation: fadeUp 0.5s 0.1s both;
  }

  .brand-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.1em;
    background: linear-gradient(90deg, var(--red) 0%, var(--blue) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .brand-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 8px var(--red);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.65); }
  }

  .login-head {
    margin-bottom: 32px;
    animation: fadeUp 0.5s 0.15s both;
  }

  .login-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 0.04em;
    line-height: 0.95;
    margin-bottom: 10px;
  }

  .login-title .r { color: var(--red); }
  .login-title .b { color: var(--blue); }

  .login-sub {
    font-size: 13px;
    font-weight: 300;
    color: var(--muted);
    line-height: 1.6;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .form-body { animation: fadeUp 0.5s 0.2s both; }

  .form-group { margin-bottom: 18px; }

  .form-label {
    display: block;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 7px;
  }

  .input-wrap { position: relative; }

  .input-icon {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(247,247,248,0.3);
    pointer-events: none;
  }

  .form-input {
    width: 100%;
    height: 48px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 0 14px 0 40px;
    outline: none;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  }

  .form-input::placeholder { color: rgba(247,247,248,0.18); }
  .form-input:hover { border-color: var(--border-hover); }

  .form-input:focus {
    border-color: var(--blue);
    background: rgba(20,68,245,0.06);
    box-shadow: 0 0 0 3px rgba(20,68,245,0.12);
  }

  .form-input.red-field:focus {
    border-color: var(--red);
    background: rgba(224,32,32,0.06);
    box-shadow: 0 0 0 3px rgba(224,32,32,0.12);
  }

  .pw-toggle {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: rgba(247,247,248,0.35);
    cursor: pointer; padding: 4px;
    display: flex;
    transition: color 0.2s;
  }
  .pw-toggle:hover { color: var(--white); }

  .options-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .check-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }

  .check-label input[type="checkbox"] {
    appearance: none;
    width: 15px; height: 15px;
    border: 1px solid rgba(247,247,248,0.2);
    border-radius: 3px;
    background: var(--input-bg);
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .check-label input:checked {
    background: var(--blue);
    border-color: var(--blue);
  }

  .check-label input:checked::after {
    content: '';
    position: absolute;
    left: 4px; top: 1px;
    width: 5px; height: 9px;
    border: 1.5px solid #fff;
    border-top: none; border-left: none;
    transform: rotate(45deg);
  }

  .forgot {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--red);
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .forgot:hover { opacity: 0.65; }

  .btn-launch {
    position: relative;
    width: 100%;
    height: 52px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.14em;
    color: #fff;
    overflow: hidden;
    background: linear-gradient(110deg, var(--red-dark) 0%, var(--red) 40%, var(--blue) 100%);
    background-size: 220% 100%;
    background-position: 0% 0%;
    transition: background-position 0.5s ease, transform 0.15s;
    margin-bottom: 6px;
  }

  .btn-launch:hover {
    background-position: 100% 0%;
    transform: translateY(-2px);
  }

  .btn-launch:active { transform: translateY(0); }

  .btn-launch .shine {
    position: absolute;
    top: 0; left: -120%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transform: skewX(-15deg);
    transition: left 0.5s ease;
  }

  .btn-launch:hover .shine { left: 160%; }

  .divider {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 22px 0 18px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(247,247,248,0.25);
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .sso-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .btn-sso {
    height: 42px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: rgba(247,247,248,0.7);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: border-color 0.2s, background 0.2s, color 0.2s;
  }

  .btn-sso:hover {
    border-color: var(--border-hover);
    background: rgba(247,247,248,0.06);
    color: var(--white);
  }

  .card-foot {
    margin-top: 22px;
    text-align: center;
    font-size: 12px;
    color: rgba(247,247,248,0.3);
    animation: fadeUp 0.5s 0.3s both;
  }

  .card-foot a {
    color: var(--blue);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.2s;
  }
  .card-foot a:hover { color: var(--red); }

  .field-error {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--red);
    letter-spacing: 0.05em;
    margin-top: 5px;
    display: none;
  }
  .has-error .field-error { display: block; }
  .has-error .form-input { border-color: var(--red) !important; box-shadow: 0 0 0 3px rgba(224,32,32,0.12) !important; }

  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: rgba(14,14,24,0.95);
    border: 1px solid var(--border);
    border-bottom: 2px solid var(--red);
    border-radius: 8px;
    padding: 12px 22px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--white);
    white-space: nowrap;
    opacity: 0;
    transition: transform 0.3s ease, opacity 0.3s ease;
    pointer-events: none;
    z-index: 99;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  .loader {
    position: fixed;
    inset: 0;
    background: rgba(8,8,16,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    backdrop-filter: blur(4px);
  }
  .loader.on { opacity: 1; pointer-events: all; }

  .spinner-ring {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: var(--red);
    border-right-color: var(--blue);
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 500px) {
    .card { padding: 36px 24px 30px; margin: 16px; }
    .login-title { font-size: 44px; }
  }
</style>
</head>
<body>

<div class="scene">
  <div class="bg">
    <div class="bg-grid"></div>
    <div class="orb orb-red"></div>
    <div class="orb orb-blue"></div>
    <div class="orb orb-red2"></div>
    <div class="accent-lines"></div>
  </div>

  <div class="card">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="brand">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <polygon points="3,25 14,3 25,25" fill="none" stroke="#E02020" stroke-width="1.5"/>
        <polygon points="3,25 14,14 25,25" fill="#1444F5" opacity="0.75"/>
        <line x1="14" y1="3" x2="14" y2="25" stroke="#E02020" stroke-width="1" opacity="0.45"/>
      </svg>
      <span class="brand-name">NEXUS.LAUNCH</span>
      <div class="brand-dot"></div>
    </div>

    <div class="login-head">
      <h1 class="login-title">
        SIGN <span class="r">IN</span><br>
        <span class="b" style="font-size:28px;letter-spacing:0.12em;opacity:0.7;">FOUNDER PORTAL</span>
      </h1>
      <p class="login-sub">Access your launch dashboard, portfolio &amp; investor network.</p>
    </div>

    <div class="form-body">
      <form id="loginForm" novalidate>

        <div class="form-group" id="emailGroup">
          <label class="form-label" for="email">Email Address</label>
          <div class="input-wrap">
            <svg class="input-icon" width="15" height="15" viewBox="0 0 16 16" fill="none">
              <rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.2"/>
              <path d="M1 5.5l7 4.5 7-4.5" stroke="currentColor" stroke-width="1.2"/>
            </svg>
            <input class="form-input" id="email" type="email" placeholder="you@startup.com" autocomplete="email">
          </div>
          <div class="field-error">Enter a valid email address</div>
        </div>

        <div class="form-group" id="passGroup">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrap">
            <svg class="input-icon" width="15" height="15" viewBox="0 0 16 16" fill="none">
              <rect x="3" y="7" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
              <path d="M5 7V5a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.2"/>
            </svg>
            <input class="form-input red-field" id="password" type="password" placeholder="••••••••" autocomplete="current-password">
            <button type="button" class="pw-toggle" id="pwToggle">
              <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                <ellipse cx="8" cy="8" rx="6.5" ry="4" stroke="currentColor" stroke-width="1.2"/>
                <circle cx="8" cy="8" r="1.8" stroke="currentColor" stroke-width="1.2"/>
              </svg>
            </button>
          </div>
          <div class="field-error">Must be at least 8 characters</div>
        </div>

        <div class="options-row">
          <label class="check-label">
            <input type="checkbox" id="remember">
            Remember me
          </label>
          <a href="#" class="forgot" onclick="return false;">Forgot password?</a>
        </div>

        <button type="submit" class="btn-launch">
            <a href="startup-incubator.html"></a>
          <span class="shine"></span>
          LAUNCH ACCESS
        </button>

      </form>

      <div class="divider">or continue with</div>

      <div class="sso-row">
        <button class="btn-sso" onclick="ssoLogin('Google')">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
            <path d="M15.2 8.18c0-.56-.05-1.1-.14-1.62H8v3.07h4.04a3.45 3.45 0 01-1.5 2.26v1.88h2.43c1.42-1.31 2.23-3.24 2.23-5.59z" fill="#4285F4"/>
            <path d="M8 16c2.03 0 3.73-.67 4.97-1.83l-2.43-1.88c-.67.45-1.53.72-2.54.72-1.95 0-3.6-1.32-4.19-3.08H1.3v1.94A7.99 7.99 0 008 16z" fill="#34A853"/>
            <path d="M3.81 9.93A4.8 4.8 0 013.56 8c0-.67.12-1.32.25-1.93V4.13H1.3A8 8 0 000 8c0 1.29.31 2.51.86 3.59l1.95-1.66z" fill="#FBBC05"/>
            <path d="M8 3.18c1.1 0 2.08.38 2.86 1.12l2.14-2.14C11.73.8 10.03 0 8 0A7.99 7.99 0 001.3 4.13l2.5 1.94C4.4 4.5 6.05 3.18 8 3.18z" fill="#EA4335"/>
          </svg>
          Google
        </button>
        <button class="btn-sso" onclick="ssoLogin('GitHub')">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
          GitHub
        </button>
      </div>
    </div>

    <div class="card-foot">
      New founder? <a href="#" onclick="return false;">Create your account →</a>
    </div>
  </div>
</div>

<div class="loader" id="loader"><div class="spinner-ring"></div></div>
<div class="toast" id="toast"></div>

<script>
  const emailInput = document.getElementById('email');
  const passInput  = document.getElementById('password');
  const emailGroup = document.getElementById('emailGroup');
  const passGroup  = document.getElementById('passGroup');
  const loader     = document.getElementById('loader');
  const toast      = document.getElementById('toast');
  let pwVisible    = false;

  document.getElementById('pwToggle').addEventListener('click', () => {
    pwVisible = !pwVisible;
    passInput.type = pwVisible ? 'text' : 'password';
    document.getElementById('pwToggle').innerHTML = pwVisible
      ? `<svg width="15" height="15" viewBox="0 0 16 16" fill="none">
           <path d="M2 2l12 12M6.5 6.6A2 2 0 009.4 9.5" stroke="currentColor" stroke-width="1.2"/>
           <path d="M1.2 8C2.4 5.1 5 3 8 3c.8 0 1.55.14 2.26.39M13.5 5.6C14.48 6.64 15.07 7.35 14.8 8c-1.2 2.9-3.8 5-6.8 5a7.4 7.4 0 01-3.1-.68" stroke="currentColor" stroke-width="1.2"/>
         </svg>`
      : `<svg width="15" height="15" viewBox="0 0 16 16" fill="none">
           <ellipse cx="8" cy="8" rx="6.5" ry="4" stroke="currentColor" stroke-width="1.2"/>
           <circle cx="8" cy="8" r="1.8" stroke="currentColor" stroke-width="1.2"/>
         </svg>`;
  });

  emailInput.addEventListener('input', () => emailGroup.classList.remove('has-error'));
  passInput.addEventListener('input',  () => passGroup.classList.remove('has-error'));

  document.getElementById('loginForm').addEventListener('submit', e => {
    e.preventDefault();
    let ok = true;
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value.trim())) {
      emailGroup.classList.add('has-error'); ok = false;
    }
    if (passInput.value.length < 8) {
      passGroup.classList.add('has-error'); ok = false;
    }
    if (!ok) return;
    loader.classList.add('on');
    setTimeout(() => {
      loader.classList.remove('on');
      showToast('ACCESS DENIED — Invalid credentials. Try again.');
    }, 1800);
  });

  function ssoLogin(provider) {
    loader.classList.add('on');
    setTimeout(() => {
      loader.classList.remove('on');
      showToast('REDIRECTING → ' + provider.toUpperCase() + ' SSO…');
    }, 1000);
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3200);
  }
</script>
</body>
</html>
