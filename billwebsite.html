<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing System Platform</title>
    <link rel="stylesheet" href="styles8.css">
</head>
<body>
    <header>
        <h1>Billing System Platform</h1>
    </header>
    <nav>
        <ul>
            <li><a href="#tv">TV</a></li>
            <li><a href="#phone">Phone</a></li>
            <li><a href="#house-rent">House Rent</a></li>
            <li><a href="#electricity">Electricity</a></li>
            <li><a href="#water">Water</a></li>
            <li><a href="#natural gas">natural gas</a></li>
        </ul>
    </nav>
    <main>
        <section id="tv">
            <h2>Pay TV Bill</h2>
            <form id="tv-form">
                <label for="tv-account">Account Number:</label>
                <input type="text" id="tv-account" name="tv-account" required>
                <label for="tv-amount">Amount:</label>
                <input type="number" id="tv-amount" name="tv-amount" required>
                <button type="submit">Pay Bill</button>
            </form>
        </section>
        <section id="phone">
            <h2>Pay Phone Bill</h2>
            <form id="phone-form">
                <label for="phone-number">Phone Number:</label>
                <input type="text" id="phone-number" name="phone-number" required>
                <label for="phone-amount">Amount:</label>
                <input type="number" id="phone-amount" name="phone-amount" required>
                <button type="submit">Pay Bill</button>
            </form>
        </section>
        <section id="house-rent">
            <h2>Pay House Rent</h2>
            <form id="rent-form">
                <label for="rent-account">Account Number:</label>
                <input type="text" id="rent-account" name="rent-account" required>
                <label for="rent-amount">Amount:</label>
                <input type="number" id="rent-amount" name="rent-amount" required>
                <button type="submit">Pay Rent</button>
            </form>
        </section>
        <section id="electricity">
            <h2>Pay Electricity Bill</h2>
            <form id="electricity-form">
                <label for="electricity-account">Account Number:</label>
                <input type="text" id="electricity-account" name="electricity-account" required>
                <label for="electricity-amount">Amount:</label>
                <input type="number" id="electricity-amount" name="electricity-amount" required>
                <button type="submit">Pay Bill</button>
            </form>
        </section>
        <section id="water">
            <h2>Pay Water Bill</h2>
            <form id="water-form">
                <label for="water-account">Account Number:</label>
                <input type="text" id="water-account" name="water-account" required>
                <label for="water-amount">Amount:</label>
                <input type="number" id="water-amount" name="water-amount" required>
                <button type="submit">Pay Bill</button>
            </form>
        </section>
        <section id="water">
            <h2>Pay natural gas Bill</h2>
            <form id="water-form">
                <label for="natural gas-account">Account Number:</label>
                <input type="text" id="natural gas-account" name="natural gas-account" required>
                <label for="natural gas-amount">Amount:</label>
                <input type="number" id="natural gas-amount" name="natural gas-amount" required>
                <button type="submit">Pay Bill</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 Billing System Platform</p>
    </footer>
    <script src="scripts8.js"></script>
</body>
</html>
