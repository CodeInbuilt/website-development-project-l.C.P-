<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Modern Navbar</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<style>

/* 🌈 Gradient Background */
body {
    background: linear-gradient(120deg, #667eea, #764ba2);
    min-height: 100vh;
}

/* 🔥 Glass Navbar */
.navbar {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    margin: 15px;
    padding: 10px 20px;
}

/* Logo */
.navbar-brand {
    font-weight: bold;
    font-size: 1.5rem;
    color: #fff !important;
}

/* Links */
.nav-link {
    color: #fff !important;
    margin: 0 10px;
    position: relative;
    transition: 0.3s;
}

/* Underline animation */
.nav-link::after {
    content: "";
    width: 0%;
    height: 2px;
    background: #fff;
    position: absolute;
    bottom: 0;
    left: 0;
    transition: 0.3s;
}

.nav-link:hover::after {
    width: 100%;
}

.nav-link:hover {
    transform: translateY(-2px);
}

/* Button */
.btn-custom {
    background: #fff;
    color: #764ba2;
    border-radius: 20px;
    padding: 6px 15px;
    font-weight: 500;
    transition: 0.3s;
}

.btn-custom:hover {
    background: #764ba2;
    color: #fff;
}

/* Profile */
.profile-img {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    cursor: pointer;
}

</style>
</head>

<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand" href="#">🚀 StudyPro</a>

        <!-- Mobile Toggle -->
        <button class="navbar-toggler text-white" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <i class="bi bi-list"></i>
        </button>

        <!-- Menu -->
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav mx-auto">

                <li class="nav-item">
                    <a class="nav-link" href="#"><i class="bi bi-house"></i> Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#"><i class="bi bi-bar-chart"></i> Dashboard</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#"><i class="bi bi-check2-square"></i> Tasks</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#"><i class="bi bi-journal"></i> Notes</a>
                </li>

            </ul>

            <!-- Right Side -->
            <div class="d-flex align-items-center">

                <!-- Notification -->
                <i class="bi bi-bell text-white me-3" style="font-size: 1.2rem;"></i>

                <!-- Profile Dropdown -->
                <div class="dropdown">
                    <img src="https://i.pravatar.cc/40" class="profile-img dropdown-toggle" data-bs-toggle="dropdown">

                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#">👤 Profile</a></li>
                        <li><a class="dropdown-item" href="#">⚙️ Settings</a></li>
                        <li><hr></li>
                        <li><a class="dropdown-item text-danger" href="#">🚪 Logout</a></li>
                    </ul>
                </div>

            </div>
        </div>
    </div>
</nav>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
