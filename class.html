<html>
<head>
<title> student Recodes </title>
</head>
<body>
<h1> Create student Recodes</h1>
<form>
  <label for="fname">First name:</label><br>
  <input type="text" id="fname" name="fname"><br>
  <label for="lname">Last name:</label><br>
  <input type="text" id="lname" name="lname">
<br>
<label for="Roll number">Roll number:</label><br>
  <input type="text" id="Rn" name="Roll number">
<br>
<label for="Phone">Phone:</label><br>
  <input type="text" id="Phone" name="Phone">
<br>
<br>
<label for="D.O.B">D.O.B:</label><br>
  <input type="Date" id="D.O.B" name="D.O.B">
<br>
<label for="Email">Email:</label><br>
  <input type="text" id="Ename" name="Email">
<br>

<label for="Address">Address:</label><br>
  <textarea type="Address" rows="5" cols="30"id="Address:" name="Address:"></textarea>
<br>
<h2> Gender </h2>
<input type="radio" id="Male" name="Gender" value="Male">
  <label for="Male">Male</label><br>
<input type="radio" id="Female" name="Gender" value="Female">
  <label for="Female">Female</label><br>
<input type="radio" id="Other" name="Gender" value="Other">
  <label for="Other">Other</label><br>
<h3> Course </h3>
  <input type="radio" id="B.Tech" name="Course" value="B.Tech">
  <label for="B.Tech">B.Tech</label><br>
  <input type="radio" id="B.Sc" name="Course" value="B.Sc">
  <label for="B.Sc">B.Sc</label><br>
  <input type="radio" id="MBBS" name="Course" value="MBBS">
  <label for="MBBS">MBBS</label><br>
  <input type="radio" id="B.Com" name="Course" value="B.Com">
<label for="B.Com">B.Com</label><br>
<input type="radio" id="B.A." name="Course" value="B.A.">
<label for="B.A.">B.A.</label><br>
 <input type="submit" value="Submit">
 <input type="Reset" value="clear">
</form>
</body>
</html>
