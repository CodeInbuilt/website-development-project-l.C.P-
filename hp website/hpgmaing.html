            return new Intl.NumberFormat('en-India', {
                style: 'currency',
                currency: 'INR'
            }).format(price);
        }

        // Initialize the application
        function init() {
            renderProducts();
            updateCartUI();
        }

        // Render products
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            
            if (filteredProducts.length === 0) {
                grid.innerHTML = '<div class="loading">No products found matching your criteria.</div>';
                return;
            }

            grid.innerHTML = filteredProducts.map(product => `
                <article class="product-card" tabindex="0" onclick="openModal(${product.id})" onkeydown="handleCardKeydown(event, ${product.id})" role="button" aria-label="View details for ${product.name}">
                    <div class="product-image" aria-hidden="true">
                        <img src="${product.image}" alt="${product.name}" onerror="this.style.display='none'; this.parentNode.innerHTML='<div style=\\'font-size:3rem;color:rgba(255,255,255,0.3)\\'>💻</div>';">
                    </div>
                    <div class="product-info">
                        <span class="product-category">${product.category.charAt(0).toUpperCase() + product.category.slice(1)}</span>
                        <h3 class="product-title">${product.name}</h3>
                        <p class="product-specs">${product.specs}</p>
                        <div class="product-price">${formatPrice(product.price)}</div>
                        <div class="product-actions">
                            <button class="btn btn-primary" onclick="event.stopPropagation(); addToCart(${product.id})" aria-label="Add ${product.name} to cart">Add to Cart</button>
                            <button class="btn btn-secondary" onclick="event.stopPropagation(); openModal(${product.id})" aria-label="View details for ${product.name}">Details</button>
                        </div>
                    </div>
                </article>
            `).join('');
        }

        // Handle keyboard navigation for product cards
        function handleCardKeydown(event, productId) {
            if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                openModal(productId);
            }
        }

        // Filter products by category
        function filterProducts(category) {
            // Update active filter button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                btn.setAttribute('aria-pressed', 'false');
            });
            
            const activeBtn = document.querySelector(`[data-category="${category}"]`);
            activeBtn.classList.add('active');
            activeBtn.setAttribute('aria-pressed', 'true');

            // Filter products
            if (category === 'all') {
                filteredProducts = [...products];
            } else {
                filteredProducts = products.filter(product => product.category === category);
            }

            // Apply current search and sort
            applySearch();
            applySorting();
            renderProducts();
        }

        // Search products
        function searchProducts() {
            applySearch();
            applySorting();
            renderProducts();
        }

        function applySearch() {
            const searchTerm = document.querySelector('.search-input').value.toLowerCase();
            if (searchTerm) {
                filteredProducts = filteredProducts.filter(product =>
                    product.name.toLowerCase().includes(searchTerm) ||
                    product.specs.toLowerCase().includes(searchTerm) ||
                    product.description.toLowerCase().includes(searchTerm)
                );
            }
        }

        // Sort products
        function sortProducts() {
            applySorting();
            renderProducts();
        }

        function applySorting() {
            const sortValue = document.querySelector('.sort-select').value;
            
            switch (sortValue) {
                case 'name':
                    filteredProducts.sort((a, b) => a.name.localeCompare(b.name));
                    break;
                case 'price-low':
                    filteredProducts.sort((a, b) => a.price - b.price);
                    break;
                case 'price-high':
                    filteredProducts.sort((a, b) => b.price - a.price);
                    break;
                case 'category':
                    filteredProducts.sort((a, b) => a.category.localeCompare(b.category));
                    break;
            }
        }

        // Modal functions
        function openModal(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;

            currentModalProduct = product;
            
            document.getElementById('modalTitle').textContent = product.name;
            document.getElementById('modalCategory').textContent = product.category.charAt(0).toUpperCase() + product.category.slice(1);
            document.getElementById('modalSpecs').textContent = product.specs;
            document.getElementById('modalPrice').textContent = formatPrice(product.price);
            document.getElementById('modalDescription').textContent = product.description;
            
            // Set modal image
            const modalImage = document.getElementById('modalImage');
            modalImage.innerHTML = `<img src="${product.image}" alt="${product.name}" onerror="this.style.display='none'; this.parentNode.innerHTML='<div style=\\'font-size:4rem;color:rgba(255,255,255,0.3)\\'>💻</div>';">`;
            
            document.getElementById('productModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
            
            // Focus management
            document.querySelector('.modal-close').focus();
        }

        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
            document.body.style.overflow = '';
            currentModalProduct = null;
        }

        function addToCartFromModal() {
            if (currentModalProduct) {
                addToCart(currentModalProduct.id);
                closeModal();
            }
        }

        // Cart functions
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;

            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            updateCartUI();
            saveCart();
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCartUI();
            saveCart();
        }

        function updateQuantity(productId, change) {
            const item = cart.find(item => item.id === productId);
            if (!item) return;

            item.quantity += change;
            
            if (item.quantity <= 0) {
                removeFromCart(productId);
            } else {
                updateCartUI();
                saveCart();
            }
        }

        function updateCartUI() {
            const cartCount = document.getElementById('cartCount');
            const cartItems = document.getElementById('cartItems');
            const cartTotalSection = document.getElementById('cartTotalSection');
            const cartTotalAmount = document.getElementById('cartTotalAmount');

            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            cartCount.textContent = totalItems;
            cartCount.style.display = totalItems > 0 ? 'flex' : 'none';

            if (cart.length === 0) {
                cartItems.innerHTML = `
                    <div class="empty-cart">
                        <p>Your cart is empty</p>
                        <p>Start adding some gaming laptops!</p>
                    </div>
                `;
                cartTotalSection.style.display = 'none';
            } else {
                cartItems.innerHTML = cart.map(item => `
                    <div class="cart-item" role="listitem">
                        <div class="cart-item-info">
                            <h4>${item.name}</h4>
                            <div class="cart-item-price">${formatPrice(item.price)}</div>
                            <div class="quantity-controls">
                                <button class="quantity-btn" onclick="updateQuantity(${item.id}, -1)" aria-label="Decrease quantity">-</button>
                                <span aria-label="Quantity">${item.quantity}</span>
                                <button class="quantity-btn" onclick="updateQuantity(${item.id}, 1)" aria-label="Increase quantity">+</button>
                                <button class="btn btn-secondary" style="margin-left: 1rem; padding: 0.25rem 0.75rem;" onclick="removeFromCart(${item.id})" aria-label="Remove ${item.name} from cart">Remove</button>
                            </div>
                        </div>
                    </div>
                `).join('');
                
                cartTotalSection.style.display = 'block';
                cartTotalAmount.textContent = `Total: ${formatPrice(totalPrice)}`;
            }
        }

        function toggleCart() {
            const cartDrawer = document.getElementById('cartDrawer');
            const cartOverlay = document.getElementById('cartOverlay');
            
            const isOpen = cartDrawer.classList.contains('open');
            
            if (isOpen) {
                cartDrawer.classList.remove('open');
                cartOverlay.classList.remove('show');
                document.body.style.overflow = '';
            } else {
                cartDrawer.classList.add('open');
                cartOverlay.classList.add('show');
                document.body.style.overflow = 'hidden';
                
                // Focus management
                cartDrawer.querySelector('.modal-close').focus();
            }
        }

        // Cart persistence (using in-memory storage for Claude artifacts)
        // Note: In a real implementation, replace this with localStorage
        function saveCart() {
            // For Claude artifacts, we'll use in-memory storage
            // In a real implementation, use: localStorage.setItem('hp_gaming_cart', JSON.stringify(cart));
            console.log('Cart saved:', cart);
        }

        function loadCart() {
            // For Claude artifacts, cart starts empty each session
            // In a real implementation, use: 
            // const savedCart = localStorage.getItem('hp_gaming_cart');
            // if (savedCart) cart = JSON.parse(savedCart);
        }

        // Keyboard event handlers
        document.addEventListener('keydown', function(event) {
            // Close modal with Escape key
            if (event.key === 'Escape') {
                const modal = document.getElementById('productModal');
                const cartDrawer = document.getElementById('cartDrawer');
                
                if (modal.style.display === 'block') {
                    closeModal();
                } else if (cartDrawer.classList.contains('open')) {
                    toggleCart();
                }
            }
        });

        // Initialize when DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            loadCart();
            init();
        });

        // Handle search input with debouncing
        let searchTimeout;
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.querySelector('.search-input');
            searchInput.addEventListener('input', function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    // Reset filtered products to current category filter
                    const activeCategory = document.querySelector('.filter-btn.active').dataset.category;
                    filterProducts(activeCategory);
                }, 300);
            });
        });

        // Utility function to reset all filters
        function resetFilters() {
            document.querySelector('.search-input').value = '';
            document.querySelector('.sort-select').value = 'name';
            filterProducts('all');
        }

        // Add some demo functionality
        function showNotification(message) {
            // Simple notification system
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 100px;
                right: 20px;
                background: rgba(0, 255, 136, 0.9);
                color: #0a0e1a;
                padding: 1rem 1.5rem;
                border-radius: 10px;
                font-weight: bold;
                z-index: 5000;
                animation: slideIn 0.3s ease;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // Add CSS for notifications
        const notificationCSS = document.createElement('style');
        notificationCSS.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(notificationCSS);

        // Override addToCart to show notification
        const originalAddToCart = addToCart;
        addToCart = function(productId) {
            const product = products.find(p => p.id === productId);
            originalAddToCart(productId);
            showNotification(`${product.name} added to cart!`);
        };
    </script>
</body>
</html>
