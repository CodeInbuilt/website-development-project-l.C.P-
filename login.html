<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <style>
  h1{text-align: center;}
  .no-underline {
    text-decoration: none;
  }
  .no-underline {
    text-decoration: none;
  }
  .forget-password{
    text-decoration: none;
  }
  </style>
  <div class="container" id="container">
    <form class="form-container sign-up">
      <h1 class="login-title" >Login</h1>

      <section class="input-box">
        <input type="text" name="username" placeholder="Username" required />
      </section>

      <section class="input-box">
        <input type="password" name="password" placeholder="Password" required />
      </section>

      <section class="input-box">
        <input type="text" name="institution" placeholder="Institution / College" />
      </section>

      <section class="remember-forget-box">
        <div class="remember-me">
          <input type="checkbox" id="remember-me" />
          <label for="remember-me">Remember me</label>
        </div>
        <a class="forget-password" href="phone.html"target="_blank" class="no-underline">Forgot password?</a>
      </section>

      <button type="submit" class="login-button">Login</button>

      <p class="dont-have-account">
        Don't have an account?
        <a href="created.html" target="_blank" class="no-underline"><b>Register</b></a>
      </p>
    </form>
  </div>
</body>
</html>
