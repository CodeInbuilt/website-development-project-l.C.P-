<!DOCTYPE html>
<html>
<head>
<title>Table Border Example</title>

<style>
table {
  border: 2px solid black;
  border-collapse: collapse;
  width: 60%;
}

tr {
  border: 1px solid blue;
}

th, td {
  border: 1px solid red;
  padding: 10px;
  text-align: center;
}
</style>

</head>

<body>

<h2>Student Table</h2>

<table>
  <tr>
    <th>Name</th>
    <th>Course</th>
    <th>Marks</th>
  </tr>

  <tr>
    <td>Rachit</td>
    <td>Game Development</td>
    <td>84</td>
  </tr>

  <tr>
    <td>Aman</td>
    <td>Software Engineering</td>
    <td>90</td>
  </tr>

  <tr>
    <td>Priya</td>
    <td>Web Development</td>
    <td>88</td>
  </tr>

  <tr>
    <td>robin</td>
    <td>Data Science</td>
    <td>88</td>
  </tr>
</table>

</body>
</html>
