<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roman Numeral List - 1990s Style</title>
<style>
  body {
    font-family: 'Courier New', monospace;
    background: #ffcc00; /* Bright 90s yellow background */
    color: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  ol {
    list-style-type: upper-roman;
    font-size: 1.5em;
    padding-left: 50px;
    background: linear-gradient(45deg, #ff00ff, #00ffff);
    border: 3px solid #000;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 8px 8px 0 #ff00ff, -8px -8px 0 #00ffff; /* retro 3D effect */
  }

  li {
    margin-bottom: 15px;
    font-weight: bold;
    text-transform: uppercase;
  }

  li::marker {
    color: #0000ff;
    font-weight: bold;
  }
</style>
</head>
<body>

  <ol>
    <li>Python</li>
    <li>JavaScript</li>
    <li>Java</li>
    <li>C++</li>
    <li>HTML & CSS</li>
  </ol>

</body>
</html>
