<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Calendar</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    background: #0d0d0d;
    color: #fff;
    display: flex;
    justify-content: center;
    padding: 50px 20px;
  }

  table {
    border-collapse: collapse;
    width: 100%;
    max-width: 700px;
    text-align: center;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0,255,255,0.3);
  }

  caption {
    caption-side: top;
    font-size: 2em;
    margin-bottom: 10px;
    color: #00ffff;
    text-shadow: 0 0 8px #00ffff, 0 0 15px #00e5ff;
  }

  th, td {
    padding: 15px;
    border: 1px solid rgba(255,255,255,0.2);
  }

  th {
    background: rgba(0,255,255,0.2);
    color: #0d0d0d;
    font-weight: bold;
  }

  td {
    background: rgba(0,255,255,0.05);
    transition: all 0.3s ease;
    cursor: pointer;
  }

  td:hover {
    background: #00ffff;
    color: #0d0d0d;
    font-weight: bold;
    box-shadow: 0 0 10px #00ffff;
  }
</style>
</head>
<body>

<table>
  <caption>September 2025</caption>
  <tr>
    <th>Sun</th>
    <th>Mon</th>
    <th>Tue</th>
    <th>Wed</th>
    <th>Thu</th>
    <th>Fri</th>
    <th>Sat</th>
  </tr>
  <tr>
    <td></td>
    <td>1</td>
    <td>2</td>
    <td>3</td>
    <td>4</td>
    <td>5</td>
    <td>6</td>
  </tr>
  <tr>
    <td>7</td>
    <td>8</td>
    <td>9</td>
    <td>10</td>
    <td>11</td>
    <td>12</td>
    <td>13</td>
  </tr>
  <tr>
    <td>14</td>
    <td>15</td>
    <td>16</td>
    <td>17</td>
    <td>18</td>
    <td>19</td>
    <td>20</td>
  </tr>
  <tr>
    <td>21</td>
    <td>22</td>
    <td>23</td>
    <td>24</td>
    <td>25</td>
    <td>26</td>
    <td>27</td>
  </tr>
  <tr>
    <td>28</td>
    <td>29</td>
    <td>30</td>
    <td></td>
    <td></td>
    <td></td>
    <td></td>
  </tr>
</table>

</body>
</html>
