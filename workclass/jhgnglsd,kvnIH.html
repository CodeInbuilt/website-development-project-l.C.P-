<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Background Webpage</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: url('background.jpg') no-repeat center center fixed;
    background-size: cover;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #00ffff;
    text-align: center;
  }

  h1 {
    font-size: 4em;
    text-shadow: 0 0 15px #00ffff, 0 0 30px #00e5ff;
    margin-bottom: 20px;
  }

  p {
    font-size: 1.5em;
    text-shadow: 0 0 10px #00ffff;
  }

  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5); /* dark overlay for readability */
    z-index: -1;
  }
</style>
</head>
<body>

<div class="overlay"></div>

<h1>Welcome to My Neon Webpage</h1>
<p>This webpage has a cool neon theme with a background image.</p>

</body>
</html>
