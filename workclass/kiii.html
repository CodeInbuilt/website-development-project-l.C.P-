<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grocery Price List</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    background: #1a1a1a;
    color: #fff;
    display: flex;
    justify-content: center;
    padding: 50px 20px;
  }

  table {
    border-collapse: collapse;
    width: 90%;
    max-width: 700px;
    text-align: center;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 0 25px rgba(0,255,0,0.3);
  }

  caption {
    caption-side: top;
    font-size: 2em;
    margin-bottom: 15px;
    color: #00ff00;
    text-shadow: 0 0 10px #00ff00, 0 0 20px #00cc00;
  }

  th, td {
    padding: 15px;
    border: 1px solid rgba(255,255,255,0.2);
  }

  th {
    background: linear-gradient(90deg, #ff5733, #ffbd33);
    color: #0d0d0d;
    font-weight: bold;
    text-shadow: 0 0 5px #fff;
  }

  tr:nth-child(even) td {
    background: rgba(0,255,0,0.05);
  }

  tr:nth-child(odd) td {
    background: rgba(0,255,0,0.1);
  }

  td {
    transition: all 0.3s ease;
  }

  td:hover {
    background: #00ff00;
    color: #0d0d0d;
    font-weight: bold;
    box-shadow: 0 0 8px #00ff00;
  }
</style>
</head>
<body>

<table>
  <caption>Grocery Price List</caption>
  <tr>
    <th>Item</th>
    <th>Quantity</th>
    <th>Price (₹)</th>
  </tr>
  <tr>
    <td>Rice</td>
    <td>1 kg</td>
    <td>50</td>
  </tr>
  <tr>
    <td>Wheat Flour</td>
    <td>1 kg</td>
    <td>45</td>
  </tr>
  <tr>
    <td>Milk</td>
    <td>1 liter</td>
    <td>25</td>
  </tr>
  <tr>
    <td>Eggs</td>
    <td>12 pcs</td>
    <td>60</td>
  </tr>
  <tr>
    <td>Apple</td>
    <td>1 kg</td>
    <td>150</td>
  </tr>
</table>

</body>
</html>
