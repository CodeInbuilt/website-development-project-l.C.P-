<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quote and Blockquote</title>
<style>
  body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: #0d0d0d;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px;
    text-align: center;
  }

  .quote {
    font-size: 1.8em;
    color: #00ffff;
    text-shadow: 0 0 8px #00ffff, 0 0 15px #00e5ff, 0 0 25px #00bfff;
    margin-bottom: 50px;
    position: relative;
  }

  .quote::before, .quote::after {
    content: '"';
    font-size: 2em;
    vertical-align: top;
  }

  blockquote {
    font-size: 1.4em;
    color: #ff4cff;
    background: rgba(255, 255, 255, 0.05);
    border-left: 5px solid #ff4cff;
    padding: 20px 30px;
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
    position: relative;
  }

  blockquote::before {
    content: "“";
    font-size: 2em;
    position: absolute;
    left: 10px;
    top: 5px;
  }

  blockquote::after {
    content: "”";
    font-size: 2em;
    position: absolute;
    right: 10px;
    bottom: 5px;
  }

</style>
</head>
<body>

  <div class="quote">
    The only limit to our realization of tomorrow is our doubts of today.
  </div>

  <blockquote>
    Life is 10% what happens to us and 90% how we react to it.
  </blockquote>

</body>
</html>
