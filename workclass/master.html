<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Scrolling Text</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
    }

    marquee {
      font-size: 2.5em;
      font-weight: bold;
      color: #00ffff;
      text-shadow:
        0 0 8px #00ffff,
        0 0 16px #00e5ff,
        0 0 32px #00bfff,
        0 0 64px #00e5ff;
      padding: 20px 40px;
      border: 3px solid #00ffff;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.08);
      box-shadow:
        0 0 20px #00e5ff,
        0 0 40px #00bfff,
        0 0 80px #00ffff;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        box-shadow:
          0 0 20px #00e5ff,
          0 0 40px #00bfff,
          0 0 80px #00ffff;
      }
      50% {
        box-shadow:
          0 0 30px #00ffff,
          0 0 60px #00e5ff,
          0 0 100px #00bfff;
      }
    }
  </style>
</head>
<body>
  <marquee behavior="scroll" direction="left" scrollamount="10">
    🌟 Welcome to the Master Neon Scrolling Text Demo! 🌟
  </marquee>
</body>
</html>
