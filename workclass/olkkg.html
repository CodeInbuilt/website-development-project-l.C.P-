<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Webpage with Favicon</title>

<!-- Favicon link -->
<link rel="icon" type="image/png" href="favicon.png">

<style>
  body {
    font-family: 'Arial', sans-serif;
    background: #0d0d0d;
    color: #00ffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
  }

  h1 {
    font-size: 3em;
    text-shadow: 0 0 10px #00ffff, 0 0 20px #00e5ff;
    margin-bottom: 20px;
  }

  p {
    font-size: 1.2em;
    text-shadow: 0 0 5px #00ffff;
  }
</style>
</head>
<body>

<h1>Welcome to My Neon Webpage</h1>
<p>This webpage has a favicon displayed in the browser tab.</p>

</body>
</html>
