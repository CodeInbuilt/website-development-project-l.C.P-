<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Superscript and Subscript</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: radial-gradient(circle, #0f0c29, #302b63, #24243e);
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 2.5em;
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff, 0 0 20px #00e5ff, 0 0 40px #00e5ff;
      margin-bottom: 30px;
    }

    p {
      font-size: 2em;
      color: #ff00ff;
      text-shadow: 0 0 8px #ff00ff, 0 0 15px #ff33ff, 0 0 25px #ff33ff;
      margin: 20px 0;
    }

    sub, sup {
      color: #39ff14;
      text-shadow: 0 0 5px #39ff14, 0 0 15px #00ff00, 0 0 25px #00ff00;
      font-weight: bold;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      padding: 30px 50px;
      border-radius: 15px;
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Superscript & Subscript Examples</h1>
    <p>Water Formula: H<sub>2</sub>O</p>
    <p>Pythagoras Theorem: a<sup>2</sup> + b<sup>2</sup></p>
  </div>
</body>
</html>
