<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Video Player</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    background: #0d0d0d;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 50px 20px;
  }

  h1 {
    color: #00ffff;
    text-shadow: 0 0 10px #00ffff, 0 0 20px #00e5ff;
    margin-bottom: 40px;
  }

  .video-container {
    position: relative;
    width: 80%;
    max-width: 800px;
    border-radius: 20px;
    box-shadow: 0 0 25px rgba(0,255,255,0.5);
    overflow: hidden;
  }

  video {
    width: 100%;
    border-radius: 20px;
    display: block;
  }

  .description {
    margin-top: 20px;
    font-size: 1.2em;
    text-align: center;
    color: #fff;
    text-shadow: 0 0 5px #00ffff;
  }
</style>
</head>
<body>

<h1>Neon Video Player</h1>

<div class="video-container">
  <video controls>
    <source src="sample-video.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
</div>

<p class="description">Enjoy this video in a neon-themed player!</p>

</body>
</html>
