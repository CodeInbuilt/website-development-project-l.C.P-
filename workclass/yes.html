<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Marks Table</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    background: #0d0d0d;
    color: #fff;
    display: flex;
    justify-content: center;
    padding: 50px 20px;
  }

  table {
    border-collapse: collapse;
    width: 90%;
    max-width: 800px;
    text-align: center;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 0 25px rgba(0,255,255,0.3);
  }

  caption {
    caption-side: top;
    font-size: 2em;
    margin-bottom: 15px;
    color: #00ffff;
    text-shadow: 0 0 10px #00ffff, 0 0 20px #00e5ff;
  }

  th, td {
    padding: 15px;
    border: 1px solid rgba(255,255,255,0.2);
  }

  th {
    background: rgba(0,255,255,0.2);
    color: #0d0d0d;
    font-weight: bold;
  }

  td {
    background: rgba(0,255,255,0.05);
    transition: all 0.3s ease;
  }

  td:hover {
    background: #00ffff;
    color: #0d0d0d;
    font-weight: bold;
    box-shadow: 0 0 8px #00ffff;
  }

</style>
</head>
<body>

<table>
  <caption>Student Marks</caption>
  <tr>
    <th rowspan="2">Name</th>
    <th colspan="3">Subjects</th>
    <th rowspan="2">Total</th>
  </tr>
  <tr>
    <th>Math</th>
    <th>Science</th>
    <th>English</th>
  </tr>
  <tr>
    <td>Rachit</td>
    <td>95</td>
    <td>88</td>
    <td>92</td>
    <td>275</td>
  </tr>
  <tr>
    <td>Priya</td>
    <td>85</td>
    <td>90</td>
    <td>87</td>
    <td>262</td>
  </tr>
  <tr>
    <td>Amit</td>
    <td>78</td>
    <td>82</td>
    <td>80</td>
    <td>240</td>
  </tr>
</table>

</body>
</html>
