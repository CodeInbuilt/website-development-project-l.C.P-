<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Embedded YouTube Video</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    background: #0d0d0d;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 50px 20px;
  }

  h1 {
    color: #00ffff;
    text-shadow: 0 0 10px #00ffff, 0 0 20px #00e5ff;
    margin-bottom: 40px;
  }

  .video-container {
    position: relative;
    width: 80%;
    max-width: 800px;
    padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
    height: 0;
    overflow: hidden;
    border-radius: 20px;
    box-shadow: 0 0 25px rgba(0,255,255,0.5);
  }

  .video-container iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: 0;
    border-radius: 20px;
  }

  .description {
    margin-top: 20px;
    font-size: 1.2em;
    text-align: center;
    color: #fff;
    text-shadow: 0 0 5px #00ffff;
  }
</style>
</head>
<body>

<h1>Watch This Video</h1>

<div class="video-container">
  <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
          title="YouTube video" 
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
          allowfullscreen>
  </iframe>
</div>

<p class="description">This is a sample YouTube video embedded on a neon-style webpage.</p>

</body>
</html>
